name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Audit des dépendances (§ D.5-7)
        run: npm audit --audit-level=high
      - name: Générer le client Prisma
        run: npm run prisma:generate -w backend
      - name: Typecheck
        run: npm run typecheck
      - name: Tests unitaires
        run: npm run test -w backend
      - name: Tests d'intégration (RLS multi-tenant, auth MFA, audit)
        run: npm run test:integration -w backend
        env:
          LEXKYC_TEST_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/postgres
      - name: Build
        run: npm run build
