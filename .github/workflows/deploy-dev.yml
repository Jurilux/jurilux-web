# Déploiement front par environnement :
#   branche main → production (jurilux.lu)     → /var/www/juriscope/prod
#   branche dev  → staging    (dev.jurilux.lu) → /var/www/juriscope/dev
# Backend partagé (Caddy route /api,/health,/docs vers 127.0.0.1:8088).
name: Deploy front (prod & staging)

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: deploy-front-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # historique + tags pour `git describe`

      - name: Environnement cible
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=prod"   >> "$GITHUB_OUTPUT"
            echo "domain=jurilux.lu" >> "$GITHUB_OUTPUT"
          else
            echo "name=dev"    >> "$GITHUB_OUTPUT"
            echo "domain=dev.jurilux.lu" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: VITE_APP_VERSION="$(git describe --tags --always)" npm run build

      - name: Setup SSH
        env:
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          {
            echo "Host deploytarget"
            echo "  HostName $HOST"
            echo "  User deploy"
            echo "  IdentityFile ~/.ssh/deploy_key"
            echo "  IdentitiesOnly yes"
            echo "  StrictHostKeyChecking accept-new"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy
        run: |
          BASE="/var/www/juriscope/${{ steps.env.outputs.name }}"
          TS="$(date +%F_%H%M%S)_${GITHUB_SHA::7}"
          ssh deploytarget "sudo mkdir -p '$BASE/releases/$TS' && sudo chown -R deploy:deploy '$BASE/releases/$TS'"
          rsync -az --delete dist/ "deploytarget:$BASE/releases/$TS/"
          ssh deploytarget "sudo ln -sfn '$BASE/releases/$TS' '$BASE/current' && sudo chown -h deploy:www-data '$BASE/current'"
          # ne garder que les 5 dernières releases
          ssh deploytarget "cd '$BASE/releases' && ls -1dt */ | tail -n +6 | xargs -r sudo rm -rf"
          echo "Déployé $TS → $BASE (${{ steps.env.outputs.name }})"

      - name: Smoke test
        run: |
          sleep 2
          curl -sSf -o /dev/null -w "front ${{ steps.env.outputs.name }} (${{ steps.env.outputs.domain }}): %{http_code}\n" \
            "https://${{ steps.env.outputs.domain }}/"
