name: Deploy DEV (dev.jurilux.lu)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # historique + tags complets pour `git describe`

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        # Version affichée en bas de page = tag (ex. v1.0.0) ou v1.0.0-N-gSHA entre deux tags.
        run: VITE_APP_VERSION="$(git describe --tags --always)" npm run build

      - name: Setup SSH
        env:
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          {
            echo "Host deploytarget"
            echo "  HostName $HOST"
            echo "  User deploy"
            echo "  IdentityFile ~/.ssh/deploy_key"
            echo "  IdentitiesOnly yes"
            echo "  StrictHostKeyChecking accept-new"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config
          echo "diag: host_len=${#HOST} key_len=${#KEY}"

      - name: Deploy
        env:
          BASE: ${{ secrets.DEPLOY_PATH }}
        run: |
          TS="$(date +%F_%H%M%S)_${GITHUB_SHA::7}"
          ssh deploytarget "sudo mkdir -p '$BASE/releases/$TS' && sudo chown -R deploy:deploy '$BASE/releases/$TS'"
          rsync -az --delete dist/ "deploytarget:$BASE/releases/$TS/"
          ssh deploytarget "sudo ln -sfn '$BASE/releases/$TS' '$BASE/current' && sudo chown -h deploy:www-data '$BASE/current'"
          echo "Deployed $TS"

      - name: Smoke test
        run: |
          sleep 2
          curl -sSf -o /dev/null -w "front: %{http_code}\n" http://${{ secrets.DEPLOY_HOST }}/
