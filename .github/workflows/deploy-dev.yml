name: Deploy DEV (dev.jurilux.lu)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy (rsync + activate)
        env:
          SSHOPTS: "-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          TARGET: "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          BASE: "${{ secrets.DEPLOY_PATH }}"
        run: |
          TS="$(date +%F_%H%M%S)_${GITHUB_SHA::7}"
          ssh $SSHOPTS "$TARGET" "sudo mkdir -p $BASE/releases/$TS && sudo chown -R ${{ secrets.DEPLOY_USER }}:${{ secrets.DEPLOY_USER }} $BASE/releases/$TS"
          rsync -az --delete -e "ssh $SSHOPTS" dist/ "$TARGET:$BASE/releases/$TS/"
          ssh $SSHOPTS "$TARGET" "sudo ln -sfn $BASE/releases/$TS $BASE/current && sudo chown -h ${{ secrets.DEPLOY_USER }}:www-data $BASE/current"
          echo "Deployed release $TS"

      - name: Smoke test
        run: |
          sleep 2
          curl -sSf -o /dev/null -w "front: %{http_code}\n" http://${{ secrets.DEPLOY_HOST }}/
